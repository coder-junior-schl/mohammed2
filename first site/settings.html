<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loving Homes - Settings</title>
<style>
  body { font-family:'Times New Roman'; margin:0; padding:0; }
  nav { text-align:center; margin:20px 0; }
  nav a { margin:0 15px; text-decoration:none; color:black; font-size:18px; }
  .settings { max-width:600px; margin:40px auto; }
  .setting-item { display:flex; justify-content:space-between; align-items:center; margin:20px 0; }
  button { padding:10px 20px; cursor:pointer; }
</style>
</head>
<body>

<nav>
  <a href="index.html" data-i18n="nav_home">Home</a>
  <a href="facilities.html" data-i18n="nav_facilities">Facilities</a>

  <a href="settings.html" data-i18n="nav_settings">Settings</a>

<div class="settings">
  <div class="setting-item">
    <span data-i18n="dark_mode">🌙 Dark Mode</span>
    <button id="darkModeBtn">OFF</button>
  </div>
  <div class="setting-item">
    <span data-i18n="text_size">🔎 Text Size</span>
    <button id="textSizeBtn">MEDIUM</button>
  </div>
  <div class="setting-item">
    <span data-i18n="language">🌍 Language (ENG/AR)</span>
    <button id="langBtn">ENG</button>
  </div>
  <div class="setting-item">
    <span data-i18n="high_contrast">🎨 High Contrast</span>
    <button id="contrastBtn">OFF</button>
  </div>
